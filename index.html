<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>RW Pocket - JSNES</title>
    <link rel="stylesheet" type="text/css" href="./index.css?v=14">
</head>
<body>
<main class="page">
    <section class="console-shell">
        <header class="console-top">
            <div>
                <div class="brand">RW Pocket</div>
                <div id="current-game" class="current-game">1943</div>
            </div>
            <div class="top-actions">
                <div class="power-wrap">
                    <span class="led"></span>
                    <span id="status-text">Booting</span>
                </div>
            </div>
        </header>
        <div class="top-action-buttons">
            <button id="open-shortcuts" class="icon-btn shortcut-icon-btn" type="button" aria-label="&#24555;&#25463;&#38190;&#35828;&#26126;">?</button>
            <button id="open-library" class="tiny-btn library-btn" type="button">&#28216;&#25103;&#20179;&#24211;</button>
        </div>

        <div class="screen-toolbar">
            <label class="speed-control" for="speed-slider">
                <span class="speed-label"><span>&#36895;&#24230;&#65306;</span><strong id="speed-value">100%</strong></span>
                <input id="speed-slider" class="speed-slider" type="range" min="50" max="150" step="5" value="100" aria-label="&#36895;&#24230;&#35843;&#33410;">
            </label>
        </div>

        <div class="screen-bezel">
            <canvas id="nes-canvas" width="256" height="240"></canvas>
            <div id="boot-overlay" class="boot-overlay">Loading ROM...</div>
        </div>

        <section class="control-panel">
            <div class="left-controls">
                <div id="stick-zone" class="stick-zone" aria-label="D-pad joystick">
                    <div class="stick-base"></div>
                    <div id="stick-knob" class="stick-knob"></div>
                </div>
                <div id="dpad-zone" class="dpad-zone is-hidden" aria-label="D-pad cross">
                    <button class="dpad-btn dpad-ul" data-dir="ul" aria-label="Up Left"></button>
                    <button class="dpad-btn dpad-up" data-dir="up" aria-label="Up"></button>
                    <button class="dpad-btn dpad-ur" data-dir="ur" aria-label="Up Right"></button>

                    <button class="dpad-btn dpad-dl" data-dir="dl" aria-label="Down Left"></button>
                    <button class="dpad-btn dpad-down" data-dir="down" aria-label="Down"></button>
                    <button class="dpad-btn dpad-dr" data-dir="dr" aria-label="Down Right"></button>

                    <button class="dpad-btn dpad-left" data-dir="left" aria-label="Left"></button>
                    <button class="dpad-btn dpad-right" data-dir="right" aria-label="Right"></button>
                    <div class="dpad-center"></div>
                </div>
            </div>

            <div class="middle-controls">
                <button id="btn-mode-toggle" class="pill-btn mode-toggle-btn" type="button">&#21313;&#23383;</button>
                <button id="btn-select" class="pill-btn" type="button">&#20999;&#25442;</button>
                <button id="btn-start" class="pill-btn" type="button">&#24320;&#22987;</button>
            </div>

            <div class="right-controls">
                <button id="btn-b" class="action-btn btn-b" type="button">B</button>
                <button id="btn-a" class="action-btn btn-a" type="button">A</button>
                <button id="btn-d" class="action-btn btn-d turbo-btn" type="button">D</button>
                <button id="btn-c" class="action-btn btn-c turbo-btn" type="button">C</button>
            </div>
        </section>

        <footer class="help-bar">
            <div class="help-actions">
                <button id="toggle-pause" class="tiny-btn" type="button">&#26242;&#20572;</button>
                <button id="save-state" class="tiny-btn" type="button">&#23384;&#26723;</button>
                <button id="load-state" class="tiny-btn" type="button">&#35835;&#26723;</button>
                <button id="resume-audio" class="tiny-btn" type="button">&#38745;&#38899;</button>
            </div>
        </footer>

        <section id="shortcut-overlay" class="shortcut-overlay is-hidden" aria-hidden="true">
            <div class="shortcut-panel">
                <div class="shortcut-header">
                    <h3>&#24555;&#25463;&#38190;&#35828;&#26126;</h3>
                    <button id="close-shortcuts" class="tiny-btn" type="button">&#20851;&#38381;</button>
                </div>
                <ul class="shortcut-list">
                    <li><span>&#26041;&#21521;&#65288;&#19978;/&#19979;/&#24038;/&#21491;&#65289;</span><code>W / S / A / D</code></li>
                    <li><span>A / B</span><code>K / J</code></li>
                    <li><span>Select / Start</span><code>[ / ]</code></li>
                    <li><span>&#23384;&#26723; / &#35835;&#26723;</span><code>- / =</code></li>
                    <li><span>&#26242;&#20572; / &#32487;&#32493;</span><code>Enter</code></li>
                </ul>
            </div>
        </section>

        <section id="library-overlay" class="library-overlay is-hidden" aria-hidden="true">
            <div class="library-panel">
                <div class="library-header">
                    <div>
                        <h2>游戏仓库</h2>
                        <p id="library-subtitle">请选择一款游戏畅玩吧...</p>
                    </div>
                    <button id="close-library" class="tiny-btn" type="button">关闭</button>
                </div>
                <div class="library-toolbar">
                    <input id="game-search" class="search-input" type="text" placeholder="输入名称搜索...">
                    <div class="toolbar-right">
                        <span id="game-count" class="game-count">0 游戏</span>
                        <button id="random-game" class="tiny-btn" type="button">随机</button>
                    </div>
                </div>
                <div id="game-grid" class="game-grid"></div>
                <div class="library-footer">
                    <button id="load-selected" class="tiny-btn primary-btn" type="button">确定</button>
                </div>
            </div>
        </section>
    </section>
</main>

<script src="./jsnes.min.js"></script>
<script src="./index.js?v=14"></script>
</body>
</html>
